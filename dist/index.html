<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WalkingMan — Pose Editor</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚶</text></svg>" />
  <script type="module" crossorigin src="./assets/main-Dem173_s.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/GLTFLoader-BXepGR4o.js">
  <link rel="stylesheet" crossorigin href="./assets/main-BDd8WxP7.css">
</head>
<body>
  <div id="app">
    <div id="viewport"></div>

    <aside id="panel">
      <h1>WalkingMan</h1>

      <section>
        <h2>조인트</h2>
        <div id="joint-name" class="joint-name">조인트를 클릭하세요</div>
        <div class="mode-row">
          <button id="mode-rotate" class="mode-btn active">회전</button>
          <button id="mode-translate" class="mode-btn">이동</button>
        </div>
        <div class="slider-row">
          <label>X</label>
          <input type="range" id="rot-x" min="-180" max="180" step="1" value="0" disabled />
          <span id="rot-x-val">0°</span>
        </div>
        <div class="slider-row">
          <label>Y</label>
          <input type="range" id="rot-y" min="-180" max="180" step="1" value="0" disabled />
          <span id="rot-y-val">0°</span>
        </div>
        <div class="slider-row">
          <label>Z</label>
          <input type="range" id="rot-z" min="-180" max="180" step="1" value="0" disabled />
          <span id="rot-z-val">0°</span>
        </div>
        <div class="btn-row">
          <button id="reset-joint" disabled>조인트 초기화</button>
          <button id="reset-pose">전체 초기화</button>
        </div>
      </section>

      <section>
        <h2>데스크탑 캐릭터</h2>
        <button id="overlay-toggle">🚶 화면에서 걷기 켜기/끄기</button>
      </section>

      <section>
        <h2>파일</h2>
        <div class="btn-row">
          <button id="export-json">내보내기</button>
          <button id="import-json">불러오기</button>
          <input type="file" id="import-file" accept=".json" hidden />
        </div>
      </section>

      <section class="help">
        <h2>사용법</h2>
        <p>조인트(구슬)를 클릭해 선택하고, 기즈모나 슬라이더로 회전시켜 포즈를 만듭니다. 포즈를 키프레임으로 추가하면 아래 타임라인에서 부드럽게 이어 재생됩니다.</p>
      </section>
    </aside>

    <footer id="timeline">
      <div class="transport">
        <button id="play-btn" title="재생/일시정지">▶</button>
        <label class="check"><input type="checkbox" id="loop-chk" checked /> 루프</label>
        <label class="num">속도
          <select id="speed-sel">
            <option value="0.25">0.25×</option>
            <option value="0.5">0.5×</option>
            <option value="1" selected>1×</option>
            <option value="1.5">1.5×</option>
            <option value="2">2×</option>
          </select>
        </label>
        <label class="num">구간(초)
          <input type="number" id="seg-dur" min="0.1" max="5" step="0.1" value="0.5" />
        </label>
      </div>
      <input type="range" id="scrubber" min="0" max="1000" value="0" disabled />
      <div class="kf-bar">
        <div id="kf-chips"></div>
        <div class="kf-actions">
          <button id="kf-add">＋ 포즈 추가</button>
          <button id="kf-overwrite" disabled>덮어쓰기</button>
          <button id="kf-delete" disabled>삭제</button>
        </div>
      </div>
    </footer>
  </div>

</body>
</html>
